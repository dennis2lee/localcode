<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LocalCode</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --warn: #d29922;
    --err: #f85149;
    --ok: #3fb950;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .right { display: flex; align-items: center; gap: 10px; }
  header .session-id { color: var(--muted); font-size: 12px; font-family: monospace; }
  header .agent-select {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
  }
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  #transcript {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #transcript .msg-user { color: var(--accent); font-weight: 600; }
  #transcript .msg-tool { color: var(--muted); font-style: italic; }
  #transcript .msg-error { color: var(--err); font-weight: 600; }
  aside {
    width: 280px;
    border-left: 1px solid var(--border);
    padding: 12px;
    overflow-y: auto;
    font-size: 12px;
  }
  .side-section { margin-bottom: 18px; }
  .side-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  aside h2 { font-size: 12px; text-transform: uppercase; color: var(--muted); margin: 0; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 6px;
    line-height: 1.4;
  }
  .task { border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; margin-bottom: 6px; }
  .task .agent { color: var(--muted); }
  .task .status-running { color: var(--warn); }
  .task .status-completed { color: var(--ok); }
  .task .status-failed, .task .status-cancelled { color: var(--err); }
  .session-item {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 6px;
  }
  .session-item.active { border-color: var(--accent); }
  .session-item .meta { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 6px; }
  .session-item .actions { display: flex; gap: 4px; }
  .session-item button { padding: 3px 8px; font-size: 11px; }
  .session-item .danger-btn { background: var(--err); color: #fff; }
  .mcp-item {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    margin-bottom: 6px;
    font-family: monospace;
  }
  footer {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  #input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 10px;
    font: inherit;
    resize: none;
    overflow-y: auto;
    max-height: 240px;
    line-height: 1.4;
  }
  #input.drag-over { border-color: var(--accent); border-style: dashed; }
  button {
    background: var(--accent);
    color: #05131f;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #permission-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
  }
  #permission-modal.open { display: flex; }
  #permission-modal .box {
    background: var(--panel);
    border: 1px solid var(--warn);
    border-radius: 8px;
    padding: 20px;
    max-width: 480px;
  }
  #permission-modal h3 { margin-top: 0; color: var(--warn); }
  #permission-modal .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  #permission-modal .deny { background: var(--err); }

  #prompt-status {
    padding: 0 16px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    min-height: 16px;
  }
  #prompt-status.ctx-warn { color: var(--warn); }
  #prompt-status.ctx-crit { color: var(--err); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .25; } }
  .comm-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    display: inline-block;
    flex-shrink: 0;
  }
  .comm-dot.active { background: var(--warn); animation: pulse 1s infinite; }
  .comm-dot.flash { background: var(--ok); animation: pulse .3s 2; }
</style>
</head>
<body>
<header>
  <h1>LocalCode</h1>
  <div class="right">
    <select class="agent-select" id="agent-select" title="에이전트 전환"></select>
    <span class="session-id" id="session-id">connecting…</span>
  </div>
</header>
<main>
  <div id="transcript"></div>
  <aside>
    <div class="side-section">
      <div class="side-header">
        <h2>세션</h2>
        <button class="icon-btn" id="new-session-btn" title="새 세션 시작">+ 새 세션</button>
      </div>
      <div id="session-list"></div>
    </div>
    <div class="side-section">
      <h2>Background tasks</h2>
      <div id="tasks"></div>
    </div>
    <div class="side-section">
      <h2>MCP 서버</h2>
      <div id="mcp-servers"></div>
    </div>
  </aside>
</main>
<footer>
  <textarea id="input" rows="1" placeholder="메시지를 입력하세요 (Enter로 전송, /help로 도움말, 파일을 드래그해서 첨부)" autofocus></textarea>
  <button id="send">전송</button>
</footer>
<div id="prompt-status">
  <span class="comm-dot" id="comm-dot" title="LLM과 통신 중"></span>
  <span id="status-text"></span>
</div>

<div id="permission-modal">
  <div class="box">
    <h3>권한 요청</h3>
    <p id="permission-text"></p>
    <div class="actions">
      <button class="deny" id="permission-deny">거부</button>
      <button id="permission-allow">승인</button>
    </div>
  </div>
</div>

<script>
(function () {
  const transcriptEl = document.getElementById('transcript');
  const tasksEl = document.getElementById('tasks');
  const sessionIdEl = document.getElementById('session-id');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const modalEl = document.getElementById('permission-modal');
  const permissionTextEl = document.getElementById('permission-text');
  const permissionAllowBtn = document.getElementById('permission-allow');
  const permissionDenyBtn = document.getElementById('permission-deny');
  const sessionListEl = document.getElementById('session-list');
  const newSessionBtn = document.getElementById('new-session-btn');
  const agentSelectEl = document.getElementById('agent-select');
  const mcpServersEl = document.getElementById('mcp-servers');
  const statusTextEl = document.getElementById('status-text');
  const statusBarEl = document.getElementById('prompt-status');
  const commDotEl = document.getElementById('comm-dot');

  let sessionID = null;
  let eventSource = null;
  let pendingPermissionID = null;
  let waiting = false;
  let tasks = new Map(); // task_id -> {agent, status}
  let agents = []; // [{name, description}]
  let currentAgent = null;
  let customCommands = []; // [{name, description}]
  let sessions = []; // cached list rendered in the aside
  let mcpServers = [];
  let lastUsage = null; // {input_tokens, output_tokens, max_context, percent, tps, show_tps, model}
  let autoCompactEnabled = true;
  let showTPS = true;

  function appendLine(html) {
    transcriptEl.insertAdjacentHTML('beforeend', html);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  function appendText(text) {
    // Append raw text to the last text node run so streaming deltas don't
    // each get their own DOM element.
    const last = transcriptEl.lastChild;
    if (last && last.nodeType === Node.TEXT_NODE) {
      last.textContent += text;
    } else {
      transcriptEl.appendChild(document.createTextNode(text));
    }
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  function setWaiting(v) {
    waiting = v;
    sendBtn.disabled = v;
    if (v) {
      commDotEl.classList.remove('flash');
      commDotEl.classList.add('active');
    } else {
      commDotEl.classList.remove('active');
      commDotEl.classList.add('flash');
      setTimeout(() => commDotEl.classList.remove('flash'), 600);
    }
    renderStatusBar();
  }

  // renderStatusBar draws the single line below the prompt box: current
  // agent/model, context-window usage, tokens-per-second (if enabled), and
  // (via commDotEl, toggled from setWaiting) whether a turn is in flight.
  function renderStatusBar() {
    const parts = [];
    parts.push(`agent: ${currentAgent || '?'}`);
    if (lastUsage && lastUsage.model) parts.push(`model: ${lastUsage.model}`);
    if (lastUsage && typeof lastUsage.percent === 'number') {
      parts.push(`context: ${lastUsage.percent.toFixed(1)}%`);
    }
    if (showTPS && lastUsage && lastUsage.tps) {
      parts.push(`${lastUsage.tps.toFixed(1)} tok/s`);
    }
    if (waiting) parts.push('응답 대기 중…');
    statusTextEl.textContent = parts.join('  ·  ');

    statusBarEl.classList.remove('ctx-warn', 'ctx-crit');
    if (lastUsage && typeof lastUsage.percent === 'number') {
      if (lastUsage.percent >= 90) statusBarEl.classList.add('ctx-crit');
      else if (lastUsage.percent >= 70) statusBarEl.classList.add('ctx-warn');
    }
  }

  function renderTasks() {
    tasksEl.innerHTML = '';
    if (tasks.size === 0) {
      tasksEl.innerHTML = '<div style="color:var(--muted)">없음</div>';
      return;
    }
    for (const [id, t] of tasks) {
      const div = document.createElement('div');
      div.className = 'task';
      div.innerHTML = `<div class="agent">${t.agent || ''}</div>` +
        `<div>${id}</div>` +
        `<div class="status-${t.status}">${t.status}</div>`;
      tasksEl.appendChild(div);
    }
  }

  async function api(method, path, body) {
    const resp = await fetch(path, {
      method,
      headers: body ? { 'Content-Type': 'application/json' } : undefined,
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!resp.ok) {
      const text = await resp.text().catch(() => '');
      throw new Error(`${method} ${path}: ${resp.status} ${text}`);
    }
    if (resp.status === 204) return null;
    const ct = resp.headers.get('content-type') || '';
    return ct.includes('application/json') ? resp.json() : null;
  }

  function applyEvent(ev) {
    switch (ev.type) {
      case 'message.user':
        if (ev.data && typeof ev.data.text === 'string') {
          appendLine(`<div class="msg-user">You: ${escapeHtml(ev.data.text)}</div>`);
        }
        break;
      case 'message.part.delta':
        if (ev.data && typeof ev.data.text === 'string') appendText(ev.data.text);
        break;
      case 'message.part.end':
        appendText('\n\n');
        setWaiting(false);
        break;
      case 'tool.start':
        appendLine(`<div class="msg-tool">[tool] ${escapeHtml(ev.data.name || '')} 실행 중...</div>`);
        break;
      case 'tool.end':
        appendLine(`<div class="msg-tool">[tool] ${ev.data.is_error ? '실패' : '완료'}</div>`);
        break;
      case 'permission.request':
        pendingPermissionID = ev.data.id;
        permissionTextEl.textContent = `[${ev.data.tool}] ${ev.data.description}`;
        modalEl.classList.add('open');
        break;
      case 'permission.resolved':
        modalEl.classList.remove('open');
        break;
      case 'task.spawned':
        tasks.set(ev.data.task_id, { agent: ev.data.agent, status: 'spawned' });
        renderTasks();
        appendLine(`<div class="msg-tool">[task] ${ev.data.task_id} (${ev.data.agent}) 백그라운드 실행 시작</div>`);
        break;
      case 'task.status':
        if (tasks.has(ev.data.task_id)) tasks.get(ev.data.task_id).status = ev.data.status;
        else tasks.set(ev.data.task_id, { agent: '', status: ev.data.status });
        renderTasks();
        break;
      case 'agent.switched':
        setCurrentAgent(ev.data.agent);
        appendLine(`<div class="msg-tool">→ ${escapeHtml(ev.data.agent)} 에이전트로 전환</div>`);
        renderStatusBar();
        break;
      case 'usage':
        lastUsage = ev.data;
        renderStatusBar();
        break;
      case 'compacted':
        appendLine(`<div class="msg-tool">[system] 대화가 context 절약을 위해 압축되었습니다 (요약 ${ev.data.summary_length || 0}자).</div>`);
        break;
      case 'config.changed':
        if (typeof ev.data.auto_compact_enabled === 'boolean') autoCompactEnabled = ev.data.auto_compact_enabled;
        if (typeof ev.data.show_tps === 'boolean') showTPS = ev.data.show_tps;
        renderStatusBar();
        break;
      case 'session.renamed':
        loadSessions();
        break;
      case 'error':
        setWaiting(false);
        appendLine(`<div class="msg-error">오류: ${escapeHtml(ev.data.error || '')}</div>`);
        break;
    }
  }

  async function loadAgents() {
    try {
      agents = await api('GET', '/api/agents');
    } catch (err) {
      agents = [];
    }
    agentSelectEl.innerHTML = '';
    for (const a of agents) {
      const opt = document.createElement('option');
      opt.value = a.name;
      opt.textContent = a.description ? `${a.name} — ${a.description}` : a.name;
      agentSelectEl.appendChild(opt);
    }
    if (currentAgent) agentSelectEl.value = currentAgent;
  }

  async function loadCommands() {
    try {
      customCommands = await api('GET', '/api/commands');
    } catch (err) {
      customCommands = [];
    }
  }

  async function loadSettings() {
    try {
      const s = await api('GET', '/api/settings');
      autoCompactEnabled = s.auto_compact_enabled;
      showTPS = s.show_tps;
    } catch (err) {
      // keep defaults
    }
    renderStatusBar();
  }

  async function loadMCPServers() {
    try {
      mcpServers = await api('GET', '/api/mcp-servers');
    } catch (err) {
      mcpServers = [];
    }
    renderMCPServers();
  }

  function renderMCPServers() {
    mcpServersEl.innerHTML = '';
    if (!mcpServers || mcpServers.length === 0) {
      mcpServersEl.innerHTML = '<div style="color:var(--muted)">연결된 서버 없음</div>';
      return;
    }
    for (const name of mcpServers) {
      const div = document.createElement('div');
      div.className = 'mcp-item';
      div.textContent = name;
      mcpServersEl.appendChild(div);
    }
  }

  function setCurrentAgent(name) {
    currentAgent = name;
    if ([...agentSelectEl.options].some(o => o.value === name)) {
      agentSelectEl.value = name;
    }
  }

  agentSelectEl.addEventListener('change', async () => {
    const name = agentSelectEl.value;
    if (!sessionID || name === currentAgent) return;
    try {
      await api('POST', `/api/sessions/${sessionID}/agent`, { agent: name });
      // currentAgent updates from the agent.switched event this call
      // causes the daemon to broadcast — see applyEvent — not here, so
      // every client (including this one) reacts the same way.
    } catch (err) {
      agentSelectEl.value = currentAgent; // revert the dropdown on failure
      appendLine(`<div class="msg-error">에이전트 전환 실패: ${escapeHtml(String(err))}</div>`);
    }
  });

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function connectEvents() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource(`/api/sessions/${sessionID}/events`);
    eventSource.onmessage = (e) => {
      try { applyEvent(JSON.parse(e.data)); } catch (err) { console.error('bad event', err); }
    };
    eventSource.onerror = () => {
      // EventSource auto-reconnects using Last-Event-ID; nothing to do.
    };
  }

  function formatTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString();
    } catch { return iso; }
  }

  async function loadSessions() {
    try {
      sessions = await api('GET', '/api/sessions');
    } catch (err) {
      sessions = [];
    }
    renderSessionList();
  }

  function renderSessionList() {
    sessionListEl.innerHTML = '';
    if (!sessions || sessions.length === 0) {
      sessionListEl.innerHTML = '<div style="color:var(--muted)">세션 없음</div>';
      return;
    }
    for (const s of sessions) {
      const div = document.createElement('div');
      div.className = 'session-item' + (s.id === sessionID ? ' active' : '');

      const label = s.title ? s.title : s.id;
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.title = s.id;
      meta.innerHTML = `${escapeHtml(label)}<br>${escapeHtml(s.agent)} · ${escapeHtml(formatTime(s.created_at))}`;
      div.appendChild(meta);

      const actions = document.createElement('div');
      actions.className = 'actions';

      const switchBtn = document.createElement('button');
      switchBtn.textContent = '전환';
      switchBtn.disabled = s.id === sessionID;
      switchBtn.addEventListener('click', () => selectSession(s.id, s.agent));
      actions.appendChild(switchBtn);

      const renameBtn = document.createElement('button');
      renameBtn.textContent = '이름변경';
      renameBtn.addEventListener('click', () => renameSession(s));
      actions.appendChild(renameBtn);

      const delBtn = document.createElement('button');
      delBtn.textContent = '삭제';
      delBtn.className = 'danger-btn';
      delBtn.addEventListener('click', () => deleteSession(s));
      actions.appendChild(delBtn);

      div.appendChild(actions);
      sessionListEl.appendChild(div);
    }
  }

  async function renameSession(s) {
    const newTitle = window.prompt('새 세션 이름:', s.title || '');
    if (newTitle === null) return;
    try {
      await api('POST', `/api/sessions/${s.id}/rename`, { title: newTitle });
      await loadSessions();
    } catch (err) {
      appendLine(`<div class="msg-error">이름 변경 실패: ${escapeHtml(String(err))}</div>`);
    }
  }

  async function deleteSession(s) {
    if (!window.confirm(`"${s.title || s.id}" 세션을 삭제하시겠습니까? 되돌릴 수 없습니다.`)) return;
    try {
      await api('DELETE', `/api/sessions/${s.id}`);
    } catch (err) {
      appendLine(`<div class="msg-error">세션 삭제 실패: ${escapeHtml(String(err))}</div>`);
      return;
    }
    if (s.id === sessionID) {
      await loadSessions();
      if (sessions.length > 0) {
        selectSession(sessions[0].id, sessions[0].agent);
      } else {
        await createNewSession();
      }
    } else {
      await loadSessions();
    }
  }

  function selectSession(id, agent) {
    sessionID = id;
    sessionIdEl.textContent = sessionID;
    transcriptEl.innerHTML = '';
    tasks = new Map();
    renderTasks();
    lastUsage = null;
    setWaiting(false);
    setCurrentAgent(agent);
    renderSessionList();
    connectEvents();
  }

  async function createNewSession() {
    try {
      const sess = await api('POST', '/api/sessions', { agent: 'general-purpose' });
      await loadSessions();
      selectSession(sess.id, sess.agent);
    } catch (err) {
      sessionIdEl.textContent = 'error';
      appendLine(`<div class="msg-error">세션 생성 실패: ${escapeHtml(String(err))}</div>`);
    }
  }

  newSessionBtn.addEventListener('click', createNewSession);

  const HELP_TEXT = [
    '사용 가능한 명령:',
    '  /help              이 도움말 표시',
    '  /version            데몬 버전 표시',
    '  /skill              등록된 skill 목록 표시',
    '  /skill <이름>        해당 skill을 로드해서 바로 이어서 질문',
    '  /agent              등록된 에이전트 목록 표시',
    '  /agent <이름>        해당 에이전트로 전환 (헤더 드롭다운으로도 가능)',
    '  /init              저장소를 스캔해서 AGENTS.md 규칙 파일 생성/개선',
    '  /memory            auto memory 디렉터리/인덱스(MEMORY.md) 확인',
    '  /config            현재 설정(auto_compact, show_tps) 확인',
    '  /config auto_compact on|off   context 80% 초과 시 자동 압축 켜기/끄기',
    '  /config show_tps on|off       프롬프트 하단 tokens/sec 표시 켜기/끄기',
    '  /compact           지금까지 대화를 즉시 요약해서 압축',
    '  /compact <지침>      압축 시 반영할 지침을 직접 지정',
    '  /usage              모델별 누적 토큰 사용량 확인',
    '  /commands          등록된 사용자 정의 명령 목록 표시',
    '  /<사용자 정의 명령>   .localcode/commands/*.md 로 정의한 명령 실행',
    '  exit, :q            안내만 표시 (브라우저 탭은 직접 닫아주세요)',
    '',
    '파일을 입력창에 드래그해서 첨부할 수 있습니다.',
  ].join('\n');

  // Commands handled entirely client-side — never touch the session's
  // event log, so they don't show up again on session replay. Returns
  // true if `text` was a local command (and thus already handled).
  async function tryLocalCommand(text) {
    const lower = text.toLowerCase();

    if (lower === 'exit' || lower === ':q') {
      appendLine(`<div class="msg-user">You: ${escapeHtml(text)}</div>`);
      appendLine(`<div class="msg-tool">브라우저 탭을 닫으면 종료됩니다 (Web UI는 프로그램을 직접 종료할 수 없습니다).</div>`);
      return true;
    }

    if (lower === '/help') {
      appendLine(`<div class="msg-user">You: ${escapeHtml(text)}</div>`);
      appendLine(`<div class="msg-tool">${escapeHtml(HELP_TEXT).replace(/\n/g, '<br>')}</div>`);
      return true;
    }

    if (lower === '/version') {
      appendLine(`<div class="msg-user">You: ${escapeHtml(text)}</div>`);
      try {
        const v = await api('GET', '/api/version');
        appendLine(`<div class="msg-tool">localcode ${escapeHtml(v.version)}</div>`);
      } catch (err) {
        appendLine(`<div class="msg-error">버전 조회 실패: ${escapeHtml(String(err))}</div>`);
      }
      return true;
    }

    if (lower === '/agent') {
      appendLine(`<div class="msg-user">You: ${escapeHtml(text)}</div>`);
      if (agents.length === 0) {
        appendLine(`<div class="msg-tool">등록된 에이전트가 없습니다.</div>`);
      } else {
        const lines = [`사용 가능한 에이전트 (/agent &lt;이름&gt; 으로 전환, 현재: ${escapeHtml(currentAgent || '')}):`]
          .concat(agents.map(a => `- ${escapeHtml(a.name)}: ${escapeHtml(a.description || '')}`));
        appendLine(`<div class="msg-tool">${lines.join('<br>')}</div>`);
      }
      return true;
    }

    if (lower === '/commands') {
      appendLine(`<div class="msg-user">You: ${escapeHtml(text)}</div>`);
      if (customCommands.length === 0) {
        appendLine(`<div class="msg-tool">등록된 사용자 정의 명령이 없습니다. (.localcode/commands/*.md 로 추가)</div>`);
      } else {
        const lines = ['사용 가능한 사용자 정의 명령:']
          .concat(customCommands.map(c => `- /${escapeHtml(c.name)}: ${escapeHtml(c.description || '')}`));
        appendLine(`<div class="msg-tool">${lines.join('<br>')}</div>`);
      }
      return true;
    }

    const agentMatch = text.match(/^\/agent\s+(\S+)/);
    if (agentMatch) {
      appendLine(`<div class="msg-user">You: ${escapeHtml(text)}</div>`);
      try {
        await api('POST', `/api/sessions/${sessionID}/agent`, { agent: agentMatch[1] });
      } catch (err) {
        appendLine(`<div class="msg-error">에이전트 전환 실패: ${escapeHtml(String(err))}</div>`);
      }
      return true;
    }

    // "/config" itself is handled server-side (agent.Loop) like /memory —
    // not intercepted here, so it falls through to sendMessage() below and
    // its response/config.changed event flow back over SSE like anything
    // else the model or a local command answers.
    return false;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || waiting) return;
    inputEl.value = '';
    autoResizeInput();

    if (await tryLocalCommand(text)) return;

    // The user line renders from the message.user event (see applyEvent),
    // not optimistically here, so a resumed/replayed session shows the
    // same transcript a live one did.
    setWaiting(true);
    try {
      await api('POST', `/api/sessions/${sessionID}/messages`, { text });
    } catch (err) {
      setWaiting(false);
      appendLine(`<div class="msg-error">오류: ${escapeHtml(String(err))}</div>`);
    }
  }

  function autoResizeInput() {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  }

  function insertAtCursor(el, text) {
    const start = el.selectionStart ?? el.value.length;
    const end = el.selectionEnd ?? el.value.length;
    el.value = el.value.slice(0, start) + text + el.value.slice(end);
    const pos = start + text.length;
    el.selectionStart = el.selectionEnd = pos;
    el.focus();
  }

  // uploadFile posts one dropped file to the daemon and returns its
  // absolute server-side path — the model reads it with its own file
  // tools; there's no separate "attachment" wire concept.
  async function uploadFile(file) {
    const form = new FormData();
    form.append('file', file, file.name);
    const resp = await fetch(`/api/sessions/${sessionID}/uploads`, { method: 'POST', body: form });
    if (!resp.ok) {
      const text = await resp.text().catch(() => '');
      throw new Error(`${resp.status} ${text}`);
    }
    const data = await resp.json();
    return data.path;
  }

  inputEl.addEventListener('dragover', (e) => {
    e.preventDefault();
    inputEl.classList.add('drag-over');
  });
  inputEl.addEventListener('dragleave', () => inputEl.classList.remove('drag-over'));
  inputEl.addEventListener('drop', async (e) => {
    e.preventDefault();
    inputEl.classList.remove('drag-over');
    const files = e.dataTransfer && e.dataTransfer.files;
    if (!files || files.length === 0 || !sessionID) return;
    for (const file of files) {
      try {
        const path = await uploadFile(file);
        insertAtCursor(inputEl, `[첨부 파일: ${path}]\n`);
      } catch (err) {
        appendLine(`<div class="msg-error">파일 업로드 실패 (${escapeHtml(file.name)}): ${escapeHtml(String(err))}</div>`);
      }
    }
    autoResizeInput();
  });

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('input', autoResizeInput);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  permissionAllowBtn.addEventListener('click', () => resolvePermission(true));
  permissionDenyBtn.addEventListener('click', () => resolvePermission(false));

  async function resolvePermission(allow) {
    if (!pendingPermissionID) return;
    const id = pendingPermissionID;
    pendingPermissionID = null;
    modalEl.classList.remove('open');
    try {
      await api('POST', `/api/sessions/${sessionID}/permissions/${id}`, { allow });
    } catch (err) {
      appendLine(`<div class="msg-error">권한 응답 실패: ${escapeHtml(String(err))}</div>`);
    }
  }

  async function init() {
    renderTasks();
    await loadAgents();
    await loadCommands();
    await loadSettings();
    await loadMCPServers();
    await loadSessions();

    if (!sessions || sessions.length === 0) {
      await createNewSession();
    } else {
      selectSession(sessions[0].id, sessions[0].agent);
    }
  }

  init();
})();
</script>
</body>
</html>
